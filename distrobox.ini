[dominion-vite]
additional_packages="curl gawk git gh make neovim nodejs24 npm24 stow tree"
image=registry.opensuse.org/opensuse/tumbleweed:latest
init=true
home=${HOME}/dominion-vite
replace=false
root=false

# Install Thaifont
init_hooks=zypper repos | grep -q M17N_fonts || zypper --non-interactive addrepo --no-gpgcheck --refresh https://download.opensuse.org/repositories/M17N:fonts/openSUSE_Tumbleweed/M17N:fonts.repo;
init_hooks=zypper --non-interactive install thai-fonts;
